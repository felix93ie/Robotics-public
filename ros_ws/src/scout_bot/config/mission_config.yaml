patrol_altitude: -12.0   # meters AGL in NED (negative = up)
screen_line:
  - {x: 0.0,  y: 0.0,   label: "SP"}
  - {x: 50.0, y: 0.0,   label: "PL Alpha"}
  - {x: 100.0, y: 0.0,  label: "PL Bravo"}
observation_points:
  - {x: 120.0, y: 30.0, label: "OP 1", hold_seconds: 30}
  - {x: 120.0, y: -30.0, label: "OP 2", hold_seconds: 30}
